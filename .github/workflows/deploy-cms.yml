name: Deploy CMS

on:
  push:
    branches:
      - main
      
  workflow_dispatch:

concurrency:
  group: deploy-cms
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy CMS to DigitalOcean
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEP_HOST }}
          username: ${{ secrets.DEP_USER }}
          key: ${{ secrets.DEP_SSH_KEY }}
          passphrase: ${{ secrets.DEP_SSH_PASSPHRASE }}
          port: ${{ secrets.DEP_PORT || 22 }}
          script_stop: true
          script: |
            set -eu
            dc() { docker compose -f /var/www/apf/docker-compose.yaml "$@"; }
            dump_logs() {
              status="${1:-1}"
              echo "Deployment failed with exit code ${status}"
              echo "=== docker compose ps ==="
              dc ps || true
              echo "=== cms logs (last 200 lines) ==="
              dc logs --no-color --tail=200 cms || true
              echo "=== postgres logs (last 120 lines) ==="
              dc logs --no-color --tail=120 postgres || true
            }
            on_exit() {
              status=$?
              if [ "$status" -ne 0 ]; then
                dump_logs "$status"
              fi
              exit "$status"
            }
            trap on_exit EXIT
            BRANCH="${{ github.ref_name }}"
            cd /var/www/apf/cms
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git pull origin "$BRANCH"
            dc up -d --build cms
            i=1
            max_attempts=40
            until [ "$i" -gt "$max_attempts" ]; do
              if curl -fsS http://localhost:1337/admin >/dev/null; then
                echo "CMS health check passed."
                break
              fi
              if [ $((i % 5)) -eq 0 ]; then
                echo "CMS not ready yet. Current CMS container state:"
                dc ps cms || true
              fi
              echo "Waiting for CMS... attempt $i/$max_attempts"
              sleep 3
              i=$((i + 1))
            done
            if [ "$i" -gt "$max_attempts" ]; then
              echo "CMS health check failed."
              exit 1
            fi
            trap - EXIT
            echo "CMS deploy completed successfully."
